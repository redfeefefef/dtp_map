<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Опасные участки дорог Москвы — ГИБДД</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; font-family:Arial, sans-serif; }
        #map { height: 100vh; }
        .controls { position:absolute; top:10px; left:10px; z-index:1000; background:white; padding:15px; border-radius:8px; box-shadow:0 0 15px rgba(0,0,0,0.4); width:280px; }
        .legend { position:absolute; bottom:20px; right:20px; z-index:1000; background:white; padding:12px; border-radius:8px; box-shadow:0 0 15px rgba(0,0,0,0.4); }
        .nav-info { position:absolute; bottom:70px; left:10px; z-index:1000; background:white; padding:12px; border-radius:8px; box-shadow:0 0 15px rgba(0,0,0,0.4); max-width:320px; display:none; }
        .start-marker, .end-marker {
            background:white;
            border-radius:50%;
            width:42px;
            height:42px;
            text-align:center;
            line-height:42px;
            font-size:22px;
            font-weight:bold;
            border:4px solid #000;
            box-shadow:0 0 12px rgba(0,0,0,0.8);
        }
        .start-marker { background:#00ff00; }
        .end-marker { background:#ff0000; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="controls">
        <h3>🚨 Фильтры ДТП</h3>
        <label><input type="checkbox" id="light" checked> Лёгкие</label><br>
        <label><input type="checkbox" id="heavy" checked> Тяжёлые</label><br>
        <label><input type="checkbox" id="dead" checked> С погибшими</label><br><br>
        <div id="stats">Загрузка...</div>
    </div>

    <div class="legend">
        <strong>Легенда:</strong><br>
        🟠 Оранжевый — Лёгкие<br>
        🔴 Красный — Тяжёлые<br>
        ⚫ Чёрный — С погибшими
    </div>

    <div id="nav-info" class="nav-info"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script>
        const map = L.map('map').setView([55.75, 37.62], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const markersLayer = L.layerGroup().addTo(map);
        const routeLayer = L.layerGroup().addTo(map);
        const dangerLayer = L.layerGroup().addTo(map);

        let startPoint = null;
        let endPoint = null;
        let line = null;
        let bufferLayer = null;
        let timeout = null;
        let isNavMode = false;

        const navInfo = document.getElementById('nav-info');

        // ==================== КЛАСТЕРЫ ====================
        function createPieIcon(item) {
            const total = item.count;
            let l = item['Легкий'] || 0;
            let t = item['Тяжёлые'] || 0;
            let d = item['С погибшими'] || 0;

            let start = 0;
            let gradient = 'conic-gradient(';
            if (l > 0) { let p = (l/total)*360; gradient += `#f39c12 ${start}deg ${start+p}deg, `; start += p; }
            if (t > 0) { let p = (t/total)*360; gradient += `#e74c3c ${start}deg ${start+p}deg, `; start += p; }
            gradient += `#111111 ${start}deg 360deg)`;

            const size = Math.min(32 + Math.log10(total) * 13, 68);

            const icon = L.divIcon({
                html: `<div style="background:${gradient};width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;color:white;border:3px solid #111;box-shadow:0 0 10px rgba(0,0,0,0.7);font-size:${size/2.1}px;">${total}</div>`,
                className: '',
                iconSize: [size, size]
            });

            icon.options.severity = item;
            return icon;
        }

        // ==================== НАВИГАТОР ====================
        map.on('click', function(e) {
            const latlng = e.latlng;

            if (!startPoint) {
                startPoint = latlng;
                L.marker(startPoint, {icon: L.divIcon({html: 'A', className: 'start-marker'})}).addTo(map);
                isNavMode = true;
                markersLayer.clearLayers();
                loadData();
                navInfo.innerHTML = 'Точка A поставлена. Кликните точку B';
                navInfo.style.display = 'block';
                return;
            }

            if (!endPoint) {
                endPoint = latlng;
                L.marker(endPoint, {icon: L.divIcon({html: 'B', className: 'end-marker'})}).addTo(map);

                line = L.polyline([startPoint, endPoint], {color: '#0066ff', weight: 6, opacity: 0.9}).addTo(routeLayer);

                const lineGeoJSON = line.toGeoJSON();
                const buffer = turf.buffer(lineGeoJSON, 0.15, {units: 'kilometers'});
                bufferLayer = L.geoJSON(buffer, {
                    style: { color: '#ff0000', weight: 1, opacity: 0.3, fillOpacity: 0.12 }
                }).addTo(routeLayer);

                let totalDTP = 0, light = 0, heavy = 0, dead = 0;

                markersLayer.eachLayer(function(layer) {
                    if (layer.getLatLng) {
                        const pt = turf.point([layer.getLatLng().lng, layer.getLatLng().lat]);
                        if (turf.booleanPointInPolygon(pt, buffer)) {
                            totalDTP++;
                            const sev = layer.options.icon.options.severity || {};
                            if (sev['Легкий'] > 0) light += sev['Легкий'];
                            if (sev['Тяжёлые'] > 0) heavy += sev['Тяжёлые'];
                            if (sev['С погибшими'] > 0) dead += sev['С погибшими'];

                            L.circleMarker(layer.getLatLng(), { radius: 9, color: '#ff0000', fillOpacity: 1, weight: 3 }).addTo(dangerLayer);
                        }
                    }
                });

                navInfo.innerHTML = `
                    <b>Маршрут A → B</b><br>
                    Лёгких: <b>${light}</b> | Тяжёлых: <b>${heavy}</b> | С погибшими: <b>${dead}</b>
                `;
                navInfo.style.display = 'block';

                return;
            }

            // Третий клик — очистка
            routeLayer.clearLayers();
            dangerLayer.clearLayers();
            startPoint = endPoint = null;
            isNavMode = false;
            navInfo.style.display = 'none';
            loadData();
        });

        // ==================== ЗАГРУЗКА ДАННЫХ ====================
        function loadData() {
            if (timeout) clearTimeout(timeout);
            timeout = setTimeout(() => {
                const bounds = map.getBounds();
                const zoom = map.getZoom();
                const params = new URLSearchParams();
                params.append('bbox', `${bounds.getWest().toFixed(6)},${bounds.getSouth().toFixed(6)},${bounds.getEast().toFixed(6)},${bounds.getNorth().toFixed(6)}`);
                params.append('zoom', zoom);

                if (document.getElementById('light').checked) params.append('severity', 'Легкий');
                if (document.getElementById('heavy').checked) params.append('severity', 'Тяжёлые');
                if (document.getElementById('dead').checked) params.append('severity', 'С погибшими');

                fetch('/clusters?' + params)
                    .then(r => r.json())
                    .then(data => {
                        markersLayer.clearLayers();
                        data.forEach(item => {
                            L.marker([item.lat, item.lon], {icon: createPieIcon(item)}).addTo(markersLayer);
                        });
                    });
            }, 300);
        }

        fetch('/stats').then(r => r.json()).then(s => {
            document.getElementById('stats').innerHTML = `Всего: <b>${s.total}</b><br>Лёгких: <b>${s.Легкие}</b><br>Тяжёлых: <b>${s.Тяжёлые}</b><br>С погибшими: <b>${s.С_погибшими}</b>`;
        });

        map.on('moveend zoomend', loadData);
        loadData();

        document.querySelectorAll('input[type=checkbox]').forEach(cb => cb.addEventListener('change', loadData));
    </script>
</body>
</html>
